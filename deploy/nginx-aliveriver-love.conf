# Add these locations inside the existing HTTPS server block for aliveriver.xyz.
# This project is served at https://aliveriver.xyz/love/
# API requests use /love-api/ to avoid conflict with the existing /api/ tool.

location = /love {
    return 301 /love/;
}

location /love/ {
    proxy_pass http://127.0.0.1:8088/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 180s;
}

location /love-api/ {
    rewrite ^/love-api/(.*)$ /api/$1 break;
    proxy_pass http://127.0.0.1:8088;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 180s;
    client_max_body_size 20M;
}
