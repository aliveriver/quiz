server:
  port: 8080
  read_timeout: 15
  write_timeout: 120
  cors_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"

llm:
  provider: "openai"
  model: "Pro/moonshotai/Kimi-K2.6"
  max_tokens: 128
  temperature: 0.9
  timeout: 500

tts:
  model: "speech-2.6-turbo"
  voice: "wumei_yujie"
  format: "mp3"
  speed: 1.0
  vol: 1.0
  pitch: 0
  sample_rate: 32000
  bitrate: 128000

rate_limit:
  requests_per_second: 5
  burst: 10

game:
  questions_per_round: 20
  conflict_window_size: 5
  meta_base_probability: 0.05
  meta_obsession_factor: 0.003
